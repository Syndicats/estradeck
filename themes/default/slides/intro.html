<section
  id="title"
  class="on-dark"
  data-background-color="#0f172a"
  style="justify-content: center; align-items: flex-start; text-align: left"
>
  <p class="kicker" style="color: var(--secondary-color)">{{kicker}}</p>
  <h1 style="font-size: 76pt; line-height: 1.05; margin: 10px 0 22px">
    {{headline}}<br /><span style="color: var(--secondary-color)">{{accent}}</span>
  </h1>
  <p class="text-xl text-muted">{{subtitle}}</p>
  <p class="footnote" style="margin-top: 40px">{{speaker}}</p>
</section>
